# Portainer stack — self-contained (no files needed on the NAS host).
#
# Deploy in Portainer:
#   Stacks → Add stack → name "colloqui" → Web editor → paste this file
#   → under "Environment variables" add  POSTGRES_PASSWORD = <strong value>
#   → Deploy.
#
# Everything else has a working default for a Synology install at
# /volume1/docker/colloqui. Override any of them in the same env section:
#   COLLOQUI_IMAGE, DATA_DIR, API_PORT, RP_ID, ORIGIN, DEV_MODE
services:

  api:
    image: ${COLLOQUI_IMAGE:-ghcr.io/jwapps-app/colloqui:latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://app:${POSTGRES_PASSWORD}@10.213.0.10:5432/app
      - RP_ID=${RP_ID:-jjrrr.co}
      - ORIGIN=${ORIGIN:-https://colloqui.jjrrr.co}
      - DEV_MODE=${DEV_MODE:-false}
      # Web Push (PWA notifications, incl. iOS). Empty = off (safe no-op). Set
      # these in the stack's env to enable; see the README Web Push section.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
    ports:
      - "${API_PORT:-3300}:8000"
    volumes:
      - ${DATA_DIR:-/volume1/docker/colloqui/data}/uploads:/srv/uploads
    depends_on:
      db:
        condition: service_healthy
    networks: [colloqui_net]

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=app
    volumes:
      - ${DATA_DIR:-/volume1/docker/colloqui/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      colloqui_net:
        ipv4_address: 10.213.0.10

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR:-/volume1/docker/colloqui/data}:/data:ro
      - ${DATA_DIR:-/volume1/docker/colloqui/data}/backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks: [colloqui_net]
    # Daily: Postgres dump + uploads tarball, keeping the newest 14 of each.
    entrypoint:
      - sh
      - -c
      - >
        while true; do
        STAMP=$$(date +%Y%m%d-%H%M%S);
        PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h 10.213.0.10 -U app -d app -Fc -f /backups/db-$$STAMP.dump
        && { [ -d /data/uploads ] && tar czf /backups/uploads-$$STAMP.tar.gz -C /data uploads || true; }
        && ls -1t /backups/db-*.dump | tail -n +15 | xargs -r rm -f
        && ls -1t /backups/uploads-*.tar.gz | tail -n +15 | xargs -r rm -f
        && echo "[backup] $$STAMP complete" || echo "[backup] FAILED";
        sleep 86400;
        done

# An explicit user-defined bridge network — this is what gives the containers
# DNS so `api` can reach `db` by name. (Synology's legacy default bridge does
# not, which is why a network must be declared.)
networks:
  colloqui_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.213.0.0/24
