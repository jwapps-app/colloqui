# Production / self-host stack — pulls the published image instead of building.
#
#   1. cp .env.example .env   (then edit: password, RP_ID, ORIGIN, COLLOQUI_IMAGE)
#   2. docker compose -f docker-compose.prod.yml up -d
#
# To update later:  docker compose -f docker-compose.prod.yml pull && \
#                   docker compose -f docker-compose.prod.yml up -d
services:

  api:
    image: ${COLLOQUI_IMAGE:-ghcr.io/CHANGEME/colloqui:latest}
    container_name: colloqui_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://app:${POSTGRES_PASSWORD}@db:5432/app
      - RP_ID=${RP_ID}
      - ORIGIN=${ORIGIN}
      - DEV_MODE=${DEV_MODE:-false}
      # iOS push (APNs). Empty values = push stays off (safe no-op). Fill these
      # in .env to enable; see the APNs section in .env.example.
      - APNS_KEY_PATH=/run/secrets/apns.p8
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_TOPIC=${APNS_TOPIC:-}
      - APNS_SANDBOX=${APNS_SANDBOX:-false}
    ports:
      - "${API_PORT:-3300}:8000"
    volumes:
      - ${DATA_DIR:-./data}/uploads:/srv/uploads
      # Mount your downloaded APNs auth key (.p8) read-only to enable push. Put
      # the file next to this compose file as AuthKey.p8, then uncomment:
      # - ./AuthKey.p8:/run/secrets/apns.p8:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - colloqui_net

  db:
    image: postgres:17-alpine
    container_name: colloqui_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=app
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    networks:
      - colloqui_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  backup:
    image: postgres:17-alpine
    container_name: colloqui_backup
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./backup.sh:/backup.sh:ro
      - ${DATA_DIR:-./data}:/data:ro
      - ${DATA_DIR:-./data}/backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - colloqui_net
    # Daily snapshot; runs one immediately on (re)start.
    entrypoint: ["sh", "-c", "while true; do sh /backup.sh || echo '[backup] FAILED'; sleep 86400; done"]

networks:
  colloqui_net:
    name: colloqui_net
